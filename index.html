<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг Манги</title>
    <!-- Подключаем библиотеку Supabase через надежный источник -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        h1 { color: #333; }
        .manga-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .chapter { font-weight: bold; color: #007bff; }
        .error { color: red; background: #fee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Список обновлений манги</h1>
    <div id="manga-list">Загрузка данных...</div>

    <script>
        // 1. Вставь сюда свои данные из Supabase (Settings -> API)
        const S_URL = 'ВАШ_SUPABASE_URL';
        const S_KEY = 'ВАШ_SUPABASE_ANON_KEY';

        // Инициализируем клиент с уникальным именем переменной, чтобы избежать ошибки в консоли
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function loadManga() {
            const listDiv = document.getElementById('manga-list');

            try {
                // 2. Делаем запрос к твоей таблице (проверь, что название совпадает)
                const { data, error } = await _supabase
                    .from('manga_list') 
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    listDiv.innerHTML = "Список пока пуст. Отправь данные со своего ПК!";
                    return;
                }

                // 3. Выводим данные на страницу
                listDiv.innerHTML = data.map(item => `
                    <div class="manga-item">
                        <strong>${item.title}</strong> — 
                        <span class="chapter">гл. ${item.chapter}</span> 
                        <em>(${new Date(item.created_at).toLocaleString()})</em>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Ошибка при загрузке:", err);
                listDiv.innerHTML = `<div class="error">
                    <b>Ошибка доступа к БД!</b><br>
                    Проверь: <br>
                    1. Правильность URL и KEY в коде.<br>
                    2. Включен ли RLS (разрешение на SELECT) в Supabase.
                </div>`;
            }
        }

        // Запускаем загрузку
        loadManga();
    </script>
</body>
</html>
